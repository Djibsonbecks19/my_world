<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouhamad's World</title>
<link rel="icon" type="image/x-icon" href="./sky.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="theme-gold"> 

<video id="bg-video" autoplay loop playsinline crossorigin="anonymous">
  <source src="lock_in.mp4" type="video/mp4">
</video>
<div id="overlay"></div>
<div id="vignette"></div>
<div id="scanlines"></div>

<div class="topbar hud-element">
  <div class="topbar-left">
    <div class="tb-dot"></div>
    <div class="tb-line"></div>
    <span class="tb-label">Mouhamad's HUB</span>
  </div>
  
  <div id="topbar-controls-dock"></div>

  <div class="topbar-right">
    <div class="tb-stat">
      <div class="tb-ind" id="tb-dc-dot"></div>
      <span id="tb-dc-lbl">Discord</span>
    </div>
    <div class="tb-stat">
      <div class="tb-ind" id="tb-rblx-dot"></div>
      <span id="tb-rblx-lbl">Roblox</span>
    </div>
  </div>
</div>

<button id="prev-video-btn" class="edge-arrow-btn left-side hud-element hidden-by-default" title="Previous Video">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
</button>

<button id="next-video-btn" class="edge-arrow-btn right-side hud-element hidden-by-default" title="Next Video">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
</button>

<div class="page">
  
  <div id="controls-wrapper-box" class="hud-element">
    <div class="controls-row">
      <button id="toggle-video-btn" class="video-btn">
        <span class="btn-text">See Video</span>
        <span class="btn-icon">
          <svg class="icon-arrow icon-down" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
          <svg class="icon-arrow icon-up" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </span>
      </button>

      <button id="theme-cycle-btn" class="video-btn" title="Cycle Built-In Theme Accents">
        <span class="theme-swatch"></span>
        <span id="theme-label">Gold</span>
      </button>
    </div>
  </div>

  <div class="panel" id="main-panel">
    
    <div class="pane">
      <div class="pane-head">
        <div class="pane-icon discord">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/>
          </svg>
        </div>
        <div>
          <div class="pane-platform">Discord Connection</div>
          <div class="pane-user">Mouhamadx</div>
        </div>
      </div>

      <div class="lanyard-wrap">
        <img src="https://lanyard.cnrad.dev/api/819598941510959175?theme=dark&idleMessage=Currently%20making%20memories%20with%20my%20favorite%20person%20%E2%9C%A8" alt="Discord presence card" style="width: 100%; border-radius: 8px; display: block;">
      </div>

      <div class="guestbook-area" style="margin-top: auto;">
        <div class="gb-head">ANONYMOUS SERVER GUESTBOOK</div>
        <div class="gb-input-wrap">
          <span class="gb-prompt">&gt;</span>
          <input type="text" id="gb-field" placeholder="Type message & hit Enter to broadcast..." maxlength="150">
        </div>
        <div id="gb-feedback" class="gb-status"></div>
      </div>
      <div id="guestbook-section" class="hud-element">
        <h3>TERMINAL BROADCAST LOGS</h3>
          <div id="gb-live-feed">
          </div>
      </div>

    </div>

    <div class="pane">
      <div class="pane-head">
        <div class="pane-icon roblox">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <rect x="8.5" y="8.5" width="3" height="3" fill="currentColor"/>
            <rect x="12.5" y="12.5" width="3" height="3" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div class="pane-platform">Roblox Framework</div>
          <div class="pane-user">tanqr_headchot</div>
        </div>
      </div>

      <div class="rblx-top">
        <div class="rblx-av" id="rblx-av">
          <img id="rblx-av-img" src="" alt="Roblox avatar">
          <svg id="rblx-av-svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="9" r="4" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
            <path d="M4 20c0-3.5 3.6-6 8-6s8 2.5 8 6" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="rblx-display">tanqr_headchot</div>
          <div class="rblx-handle" id="rblx-id-label"><span class="skeleton-text" style="width:80px;"></span></div>
        </div>
      </div>

      <div class="presence-row">
        <svg class="pres-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2m0 16v2M2 12h2m16 0h2" stroke-linecap="round"/>
        </svg>
        <span class="pres-state" id="rblx-pres-state"><span class="skeleton-text" style="width:70px;"></span></span>
        <span class="pres-game" id="rblx-pres-game"></span>
        
        <a id="rblx-join-btn" href="roblox://placeId=142823291" class="rblx-join-shortcut hidden">JOIN MM2</a>
      </div>

      <div class="val-tracker-module">
        <div class="val-head">VALORANT HUD: SN SonBecks#GameB</div>
        <div class="val-body">
          <img id="val-rank-icon" src="https://trackercdn.com/cdn/tracker.gg/valorant/icons/tiersv2/16.png" alt="Rank Level">
          <div class="val-stats">
            <div class="val-stat-item">
              <span class="v-lbl">PEAK RATING:</span> 
              <span id="val-tier" class="v-val">LOADING... OR BROKEN...</span>
            </div>
          </div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-cell"><div class="stat-lbl">Friends</div><div class="stat-val" id="rblx-friends"><span class="skeleton-text" style="width:30px;"></span></div></div>
        <div class="stat-cell"><div class="stat-lbl">Joined</div><div class="stat-val" id="rblx-joined"><span class="skeleton-text" style="width:40px;"></span></div></div>
        <div class="stat-cell"><div class="stat-lbl">Status</div><div class="stat-val" id="rblx-status"><span class="skeleton-text" style="width:50px;"></span></div></div>
        <div class="stat-cell"><div class="stat-lbl">User ID</div><div class="stat-val" id="rblx-uid"><span class="skeleton-text" style="width:65px;"></span></div></div>
      </div>
    </div>
  </div>
  
</div>


<div class="video-controls hud-element">
  <button id="play-btn" class="video-control-btn" title="Play/Pause">
    <svg class="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>
    <svg class="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
  </button>
  <div class="progress-container">
    <input type="range" id="video-progress" min="0" max="100" step="0.1" value="0">
    <div id="timeline-bubble" class="scrub-tooltip">0:00</div>
  </div>
</div>

<div class="audio-controls hud-element">
  <button id="mute-btn" class="audio-toggle-btn" title="Toggle Sound / Hook Analyzer">
    <div id="music-waveform" class="waveform-container">
      <span class="bar" style="--i:0"></span>
      <span class="bar" style="--i:1"></span>
      <span class="bar" style="--i:2"></span>
      <span class="bar" style="--i:3"></span>
      <span class="bar" style="--i:4"></span>
    </div>
  </button>
  <div class="slider-container">
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.1">
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
