<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tanqr_headchot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- VIDEO BACKGROUND — rename your anime edit video to bg.mp4 and place it in the same folder -->
<video id="bg-video" autoplay muted loop playsinline>
  <source src="darkside.mp4" type="video/mp4">
</video>
<div id="overlay"></div>
<div id="vignette"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="tb-dot"></div>
    <div class="tb-line"></div>
    <span class="tb-label">Profile</span>
  </div>
  <div class="topbar-right">
    <div class="tb-stat">
      <div class="tb-ind" id="tb-dc-dot"></div>
      <span id="tb-dc-lbl">Discord</span>
    </div>
    <div class="tb-stat">
      <div class="tb-ind" id="tb-rblx-dot" style="background: #c9a96e;"></div>
      <span id="tb-rblx-lbl">Roblox</span>
    </div>
  </div>
</div>

<!-- MAIN PANEL -->
<div class="page">
  <div class="panel">

    <!-- DISCORD PANE -->
    <div class="pane">

      <div class="pane-head">
        <div class="pane-icon discord">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/>
          </svg>
        </div>
        <div>
          <div class="pane-platform">Discord</div>
          <div class="pane-user" id="dc-user">Loading...</div>
        </div>
      </div>

      <div class="status-row">
        <div class="s-dot offline" id="dc-dot"></div>
        <span class="s-label" id="dc-status">Fetching...</span>
        <span class="s-custom" id="dc-custom"></span>
      </div>

      <div class="activity-row" id="dc-activity">
        <div class="act-lbl">Currently playing</div>
        <div class="act-name" id="dc-act-name"></div>
      </div>

      <div class="lanyard-wrap">
        <img
          src="https://lanyard.cnrad.dev/api/819598941510959175?theme=dark&idleMessage=Currently%20making%20memories%20with%20my%20favorite%20person%20%E2%9C%A8"
          alt="Discord presence card"
        >
      </div>

    </div>

    <!-- ROBLOX PANE -->
    <div class="pane">

      <div class="pane-head">
        <div class="pane-icon roblox">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="16" height="16" rx="2" stroke="#c9a96e" stroke-width="1.5"/>
            <rect x="8.5" y="8.5" width="3" height="3" fill="#c9a96e"/>
            <rect x="12.5" y="12.5" width="3" height="3" fill="#c9a96e"/>
          </svg>
        </div>
        <div>
          <div class="pane-platform">Roblox</div>
          <div class="pane-user">tanqr_headchot</div>
        </div>
      </div>

      <div class="rblx-top">
        <div class="rblx-av" id="rblx-av">
          <img id="rblx-av-img" src="" alt="Roblox avatar">
          <svg id="rblx-av-svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="9" r="4" stroke="rgba(201,169,110,0.55)" stroke-width="1.5"/>
            <path d="M4 20c0-3.5 3.6-6 8-6s8 2.5 8 6" stroke="rgba(201,169,110,0.55)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="rblx-display" id="rblx-display">tanqr_headchot</div>
          <div class="rblx-handle" id="rblx-id-label">ID: loading...</div>
        </div>
      </div>

      <div class="presence-row">
        <svg class="pres-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2m0 16v2M2 12h2m16 0h2" stroke-linecap="round"/>
        </svg>
        <span class="pres-state" id="rblx-pres-state">Loading...</span>
        <span class="pres-game" id="rblx-pres-game"></span>
      </div>

      <div class="stat-grid">
        <div class="stat-cell">
          <div class="stat-lbl">Friends</div>
          <div class="stat-val" id="rblx-friends">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl">Joined</div>
          <div class="stat-val" id="rblx-joined">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl">Status</div>
          <div class="stat-val" id="rblx-status">—</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl">User ID</div>
          <div class="stat-val" id="rblx-uid">—</div>
        </div>
      </div>

    </div>


    

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
